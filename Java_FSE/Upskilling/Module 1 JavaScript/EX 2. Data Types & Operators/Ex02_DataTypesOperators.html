<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex02 - Data Types & Operators</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; display: flex; justify-content: center; padding: 60px 20px; }
        .box { background: white; padding: 40px; border-radius: 6px; max-width: 520px; width: 100%; border: 1px solid #ddd; }
        h2 { color: #0d3b6e; margin-bottom: 20px; }
        .info { font-size: 15px; color: #333; margin-bottom: 10px; }
        .info span { font-weight: bold; color: #1a6fbf; }
        button { margin-top: 18px; padding: 9px 22px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; cursor: pointer; margin-right: 10px; }
        button:hover { background: #1a6fbf; }
        #seatInfo { margin-top: 16px; font-size: 14px; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Ex02 – Data Types & Operators</h2>
        <div class="info">Event: <span id="eventName"></span></div>
        <div class="info">Date: <span id="eventDate"></span></div>
        <div class="info">Available Seats: <span id="seatCount"></span></div>
        <div class="info" id="summary"></div>
        <button onclick="registerSeat()">Register (–1 Seat)</button>
        <button onclick="cancelSeat()">Cancel (+1 Seat)</button>
        <div id="seatInfo"></div>
    </div>
    <script src="Ex02_DataTypesOperators.js"></script>
</body>
</html>
