<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex11 - Working With Forms</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; display: flex; justify-content: center; padding: 60px 20px; }
        .box { background: white; padding: 40px; border-radius: 6px; max-width: 480px; width: 100%; border: 1px solid #ddd; }
        h2 { color: #0d3b6e; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; color: #333; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; }
        .form-group input:focus, .form-group select:focus { outline: 2px solid #1a6fbf; border-color: #1a6fbf; }
        .error-msg { color: #c0392b; font-size: 12px; margin-top: 4px; display: none; }
        button { width: 100%; padding: 11px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: Georgia, serif; margin-top: 6px; }
        button:hover { background: #1a6fbf; }
        #successMsg { display: none; margin-top: 18px; padding: 12px; background: rgba(42,157,143,0.1); border: 1px solid #2a9d8f; border-radius: 4px; font-size: 14px; color: #1d6a5e; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Ex11 – Working With Forms</h2>
        <form id="regForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" autofocus>
                <div class="error-msg" id="nameError">Name is required.</div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="yourname@email.com">
                <div class="error-msg" id="emailError">Enter a valid email address.</div>
            </div>
            <div class="form-group">
                <label for="event">Select Event</label>
                <select id="event" name="event">
                    <option value="">-- Choose an event --</option>
                    <option value="Cultural Fest">Cultural Fest</option>
                    <option value="Health Camp">Health Camp</option>
                    <option value="Sports Meet">Sports Meet</option>
                </select>
                <div class="error-msg" id="eventError">Please select an event.</div>
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="successMsg"></div>
    </div>
    <script src="Ex11_WorkingWithForms.js"></script>
</body>
</html>
