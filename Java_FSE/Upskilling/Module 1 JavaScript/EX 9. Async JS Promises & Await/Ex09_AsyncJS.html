<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex09 - Async JS</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; padding: 40px 20px; }
        h2 { color: #0d3b6e; margin-bottom: 20px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; }
        button { padding: 9px 22px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-family: Georgia, serif; }
        button:hover { background: #1a6fbf; }
        #spinner { display: none; font-size: 14px; color: #888; margin-bottom: 16px; font-style: italic; }
        #eventContainer { display: flex; flex-wrap: wrap; gap: 14px; max-width: 760px; }
        .event-card { background: white; border: 1px solid #c8d8e8; border-radius: 6px; padding: 16px 20px; width: 210px; }
        .event-card h3 { color: #0d3b6e; font-size: 15px; margin-bottom: 6px; }
        .event-card p { font-size: 13px; color: #666; }
        #errorMsg { color: #c0392b; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ex09 – Async JS, Promises & Async/Await</h2>
    <div class="controls">
        <button onclick="loadWithPromise()">Load with .then()/.catch()</button>
        <button onclick="loadWithAsync()">Load with async/await</button>
    </div>
    <div id="spinner">Loading events...</div>
    <div id="errorMsg"></div>
    <div id="eventContainer"></div>
    <script src="Ex09_AsyncJS.js"></script>
</body>
</html>
