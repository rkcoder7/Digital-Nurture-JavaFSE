<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex04 - Functions, Closures & HOF</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; padding: 40px 20px; }
        h2 { color: #0d3b6e; margin-bottom: 20px; }
        .controls { margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; max-width: 600px; }
        .controls select { padding: 8px 12px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; }
        .controls button { padding: 8px 20px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-family: Georgia, serif; }
        .controls button:hover { background: #1a6fbf; }
        .event-card { background: white; border: 1px solid #c8d8e8; border-radius: 6px; padding: 14px 18px; margin-bottom: 12px; max-width: 500px; }
        .event-card h3 { color: #0d3b6e; font-size: 15px; margin-bottom: 4px; }
        .event-card p { font-size: 13px; color: #666; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eaf2fb; color: #0d3b6e; margin-right: 6px; }
        #regCount { margin-top: 16px; font-size: 14px; color: #0d3b6e; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ex04 – Functions, Closures & Higher-Order Functions</h2>
    <div class="controls">
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="cultural">Cultural</option>
            <option value="health">Health</option>
            <option value="sports">Sports</option>
            <option value="food">Food</option>
        </select>
        <button onclick="applyFilter()">Filter</button>
    </div>
    <div id="eventList"></div>
    <div id="regCount"></div>
    <script src="Ex04_FunctionsClosures.js"></script>
</body>
</html>
