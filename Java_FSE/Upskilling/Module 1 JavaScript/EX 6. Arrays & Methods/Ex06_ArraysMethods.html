<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex06 - Arrays & Methods</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; padding: 40px 20px; }
        h2 { color: #0d3b6e; margin-bottom: 8px; }
        .section { margin-bottom: 32px; max-width: 560px; }
        .section h3 { font-size: 15px; color: #1a6fbf; margin-bottom: 12px; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
        .event-card { background: white; border: 1px solid #c8d8e8; border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; font-size: 14px; color: #333; }
        .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .controls input { padding: 8px 12px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; width: 180px; }
        .controls button { padding: 8px 18px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
        .controls button:hover { background: #1a6fbf; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eaf2fb; color: #0d3b6e; margin-left: 6px; }
    </style>
</head>
<body>
    <h2>Ex06 – Arrays & Methods</h2>
    <div class="section">
        <h3>Add a New Event (.push)</h3>
        <div class="controls">
            <input type="text" id="newEventName" placeholder="Event name">
            <input type="text" id="newCategory" placeholder="Category">
            <button onclick="addNewEvent()">Add Event</button>
        </div>
    </div>
    <div class="section"><h3>All Events</h3><div id="allEvents"></div></div>
    <div class="section"><h3>Music Events Only (.filter)</h3><div id="musicEvents"></div></div>
    <div class="section"><h3>Formatted Event Cards (.map)</h3><div id="formattedEvents"></div></div>
    <script src="Ex06_ArraysMethods.js"></script>
</body>
</html>
