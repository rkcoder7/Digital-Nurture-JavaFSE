<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex03 - Conditionals, Loops & Error Handling</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; padding: 40px 20px; }
        h2 { color: #0d3b6e; margin-bottom: 20px; }
        .event-card { background: white; border: 1px solid #c8d8e8; border-radius: 6px; padding: 16px 20px; margin-bottom: 14px; max-width: 480px; }
        .event-card h3 { color: #0d3b6e; margin-bottom: 6px; font-size: 16px; }
        .event-card p { font-size: 14px; color: #555; margin-bottom: 8px; }
        .event-card button { padding: 7px 18px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 13px; font-family: Georgia, serif; cursor: pointer; }
        .event-card button:hover { background: #1a6fbf; }
        #message { margin-top: 16px; font-size: 14px; max-width: 480px; }
        .success { color: #2a9d8f; font-weight: bold; }
        .error { color: #c0392b; font-weight: bold; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #eaf2fb; color: #0d3b6e; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h2>Ex03 – Conditionals, Loops & Error Handling</h2>
    <p style="font-size:14px; color:#555; margin-bottom:20px; max-width:480px;">Only upcoming events with available seats are shown below.</p>
    <div id="eventList"></div>
    <div id="message"></div>
    <script src="Ex03_ConditionalsLoops.js"></script>
</body>
</html>
