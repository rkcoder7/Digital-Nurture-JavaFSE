    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise 11.1 – Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light py-5">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">

        <!-- Profile Card -->
        <div class="card shadow-sm text-center">

          <!-- card-img-top: Profile picture at the top of the card -->
          <img
            src="https://i.pravatar.cc/300?img=5"
            class="card-img-top"
            alt="Profile Photo"
          />

          <div class="card-body">
            <!-- card-title: Main heading of the card -->
            <h5 class="card-title fw-bold">Messy</h5>

            <!-- card-subtitle: Supporting subtitle below the name -->
            <h6 class="card-subtitle mb-2 text-muted">Full Stack Developer</h6>

            <!-- card-text: Description paragraph -->
            <p class="card-text">
              Passionate developer with 5+ years of experience building scalable
              web applications using React, Node.js, and cloud technologies.
            </p>

            <!-- Skill badges -->
            <div class="mb-3">
              <span class="badge bg-primary me-1">React</span>
              <span class="badge bg-success me-1">Node.js</span>
              <span class="badge bg-warning text-dark me-1">AWS</span>
              <span class="badge bg-info text-dark">MongoDB</span>
            </div>

            <!-- card-link: Action links -->
            <a href="#" class="btn btn-primary btn-sm me-2">Follow</a>
            <a href="#" class="btn btn-outline-secondary btn-sm">Message</a>
          </div>

          <!-- card-footer: Bottom section of the card -->
          <div class="card-footer text-muted small">
            Member since January 2020
          </div>

        </div><!-- /.card -->

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
