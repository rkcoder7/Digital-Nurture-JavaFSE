<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex08 - Event Handling</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; padding: 40px 20px; }
        h2 { color: #0d3b6e; margin-bottom: 20px; }
        .controls { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; max-width: 600px; }
        .controls input, .controls select { padding: 8px 12px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; }
        #eventContainer { display: flex; flex-wrap: wrap; gap: 14px; max-width: 760px; }
        .event-card { background: white; border: 1px solid #c8d8e8; border-radius: 6px; padding: 16px 18px; width: 210px; }
        .event-card h3 { color: #0d3b6e; font-size: 14px; margin-bottom: 6px; }
        .event-card p { font-size: 13px; color: #666; margin-bottom: 8px; }
        .event-card button { padding: 6px 14px; background: #0d3b6e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
        .event-card button:hover { background: #1a6fbf; }
        .badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 10px; background: #eaf2fb; color: #0d3b6e; margin-bottom: 6px; }
    </style>
</head>
<body>
    <h2>Ex08 – Event Handling</h2>
    <div class="controls">
        <input type="text" id="searchBox" placeholder="Search by name...">
        <select id="categorySelect">
            <option value="all">All Categories</option>
            <option value="cultural">Cultural</option>
            <option value="health">Health</option>
            <option value="sports">Sports</option>
            <option value="food">Food</option>
            <option value="music">Music</option>
        </select>
    </div>
    <div id="eventContainer"></div>
    <script src="Ex08_EventHandling.js"></script>
</body>
</html>
