<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ex12 - AJAX & Fetch API</title>
    <style>
        body { font-family: Georgia, serif; background: #f5f0e8; display: flex; justify-content: center; padding: 60px 20px; }
        .box { background: white; padding: 40px; border-radius: 6px; max-width: 500px; width: 100%; border: 1px solid #ddd; }
        h2 { color: #0d3b6e; margin-bottom: 22px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 9px 12px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; font-family: Georgia, serif; }
        .form-group input:focus, .form-group select:focus { outline: 2px solid #1a6fbf; border-color: #1a6fbf; }
        button { width: 100%; padding: 11px; background: #0d3b6e; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-family: Georgia, serif; margin-top: 6px; }
        button:hover { background: #1a6fbf; }
        #statusMsg { display: none; margin-top: 18px; padding: 12px 14px; border-radius: 4px; font-size: 14px; }
        .success { background: rgba(42,157,143,0.1); border: 1px solid #2a9d8f; color: #1d6a5e; }
        .failure { background: rgba(192,57,43,0.1); border: 1px solid #c0392b; color: #7b241c; }
        #spinner { display: none; font-size: 14px; color: #888; margin-top: 12px; font-style: italic; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Ex12 – AJAX & Fetch API</h2>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="yourname@email.com">
        </div>
        <div class="form-group">
            <label for="event">Event</label>
            <select id="event">
                <option value="">-- Select --</option>
                <option value="Cultural Fest">Cultural Fest</option>
                <option value="Health Camp">Health Camp</option>
                <option value="Sports Meet">Sports Meet</option>
            </select>
        </div>
        <button type="button" onclick="submitRegistration()">Submit Registration</button>
        <div id="spinner">Submitting your registration, please wait...</div>
        <div id="statusMsg"></div>
    </div>
    <script src="Ex12_AJAXFetchAPI.js"></script>
</body>
</html>
