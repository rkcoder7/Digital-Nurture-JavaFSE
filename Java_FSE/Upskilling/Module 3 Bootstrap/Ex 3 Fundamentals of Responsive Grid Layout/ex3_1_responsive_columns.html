<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ex 3.1 – Responsive Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .col-demo { background:#0d6efd; color:#fff; padding:1.5rem; border-radius:.5rem; text-align:center; }
  </style>
</head>
<body class="bg-light py-5">
<div class="container">
  <h2 class="fw-bold mb-2">Exercise 3.1 – Responsive Three Columns</h2>
  <p class="text-muted mb-4">
    Resize browser to see:
    <strong>Mobile</strong> → 1 column |
    <strong>Tablet (md)</strong> → 2 columns |
    <strong>Desktop (lg)</strong> → 3 columns
  </p>

  <!--
    col-12    = full width on mobile (stacked)
    col-md-6  = 2 per row on tablet
    col-lg-4  = 3 per row on desktop
  -->
  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="col-demo">
        Column 1<br/>
        <small>col-12 col-md-6 col-lg-4</small>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-4">
      <div class="col-demo">
        Column 2<br/>
        <small>col-12 col-md-6 col-lg-4</small>
      </div>
    </div>
    <div class="col-12 col-md-6 col-lg-4">
      <div class="col-demo">
        Column 3<br/>
        <small>col-12 col-md-6 col-lg-4</small>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
