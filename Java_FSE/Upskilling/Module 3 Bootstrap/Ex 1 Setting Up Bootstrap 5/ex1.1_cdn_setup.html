<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ex 1.1 – Bootstrap via CDN</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="p-5 bg-white rounded shadow">
      <h1 class="display-4 text-primary fw-bold">Hello, Bootstrap 5!</h1>
      <p class="lead text-muted">
        This page is linked to Bootstrap 5 via CDN. No local files needed!
      </p>
      <hr/>
      <p>Bootstrap provides ready-to-use CSS components and utilities to build
         responsive, mobile-first web pages with minimal effort.</p>
      <a href="#" class="btn btn-primary me-2">Get Started</a>
      <a href="#" class="btn btn-outline-secondary">Learn More</a>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle via CDN (includes Popper.js) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmxhMTCghPf0MTu1sfDlzDQ9+1Wx"
    crossorigin="anonymous">
  </script>
</body>
</html>
