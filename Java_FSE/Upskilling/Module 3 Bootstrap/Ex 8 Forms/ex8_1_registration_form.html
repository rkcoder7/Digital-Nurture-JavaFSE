<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ex 8.1 – Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light py-5">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">
          Exercise 8.1 – Registration Form
        </div>
        <div class="card-body p-4">
          <form>

            <!-- form-control: standard text input styling -->
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" placeholder="John Doe"/>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="john@example.com"/>
            </div>

            <!-- input-group: prepend/append elements to input -->
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text">🔒</span>
                <input type="password" class="form-control" id="password" placeholder="Min 8 characters"/>
                <button class="btn btn-outline-secondary" type="button"
                  onclick="let p=document.getElementById('password'); p.type=p.type==='password'?'text':'password'">
                  Show
                </button>
              </div>
            </div>

            <!-- Phone with country code using input-group -->
            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <div class="input-group">
                <span class="input-group-text">+91</span>
                <input type="tel" class="form-control" placeholder="9876543210"/>
              </div>
            </div>

            <!-- form-select -->
            <div class="mb-3">
              <label for="country" class="form-label">Country</label>
              <select class="form-select" id="country">
                <option selected disabled>Select country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Canada</option>
              </select>
            </div>

            <!-- form-check: radio buttons -->
            <div class="mb-3">
              <label class="form-label">Gender</label>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="male"/>
                <label class="form-check-label" for="male">Male</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="female"/>
                <label class="form-check-label" for="female">Female</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" id="other"/>
                <label class="form-check-label" for="other">Prefer not to say</label>
              </div>
            </div>

            <!-- form-check: checkbox -->
            <div class="mb-3">
              <label class="form-label">Interests</label>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="chk1"/>
                <label class="form-check-label" for="chk1">Web Development</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="chk2"/>
                <label class="form-check-label" for="chk2">Design</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="chk3"/>
                <label class="form-check-label" for="chk3">Marketing</label>
              </div>
            </div>

            <!-- File input -->
            <div class="mb-3">
              <label for="avatar" class="form-label">Profile Photo</label>
              <input class="form-control" type="file" id="avatar" accept="image/*"/>
            </div>

            <!-- Textarea -->
            <div class="mb-3">
              <label for="bio" class="form-label">Short Bio</label>
              <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
            </div>

            <!-- Terms checkbox -->
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms"/>
              <label class="form-check-label" for="terms">
                I agree to the <a href="#">Terms & Conditions</a>
              </label>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Register Now</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
