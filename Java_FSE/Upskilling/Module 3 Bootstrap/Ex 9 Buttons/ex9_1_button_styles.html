<!-- Exercise 9.1: All contextual button classes — btn-primary, btn-outline-*, sizes, states -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ex 9.1 – Button Styles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light py-5">
<div class="container">
  <h2 class="fw-bold mb-5 border-bottom pb-2">Exercise 9.1 – All Button Styles</h2>

  <!-- Solid buttons -->
  <h5 class="text-secondary mb-3">Solid Buttons (btn-*)</h5>
  <div class="d-flex flex-wrap gap-2 mb-5">
    <button class="btn btn-primary">btn-primary</button>
    <button class="btn btn-secondary">btn-secondary</button>
    <button class="btn btn-success">btn-success</button>
    <button class="btn btn-danger">btn-danger</button>
    <button class="btn btn-warning">btn-warning</button>
    <button class="btn btn-info">btn-info</button>
    <button class="btn btn-light border">btn-light</button>
    <button class="btn btn-dark">btn-dark</button>
    <button class="btn btn-link">btn-link</button>
  </div>

  <!-- Outline buttons -->
  <h5 class="text-secondary mb-3">Outline Buttons (btn-outline-*)</h5>
  <div class="d-flex flex-wrap gap-2 mb-5">
    <button class="btn btn-outline-primary">btn-outline-primary</button>
    <button class="btn btn-outline-secondary">btn-outline-secondary</button>
    <button class="btn btn-outline-success">btn-outline-success</button>
    <button class="btn btn-outline-danger">btn-outline-danger</button>
    <button class="btn btn-outline-warning">btn-outline-warning</button>
    <button class="btn btn-outline-info">btn-outline-info</button>
    <button class="btn btn-outline-light">btn-outline-light</button>
    <button class="btn btn-outline-dark">btn-outline-dark</button>
  </div>

  <!-- Sizes -->
  <h5 class="text-secondary mb-3">Button Sizes</h5>
  <div class="d-flex flex-wrap align-items-center gap-3 mb-5">
    <button class="btn btn-primary btn-lg">btn-lg</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary btn-sm">btn-sm</button>
  </div>

  <!-- Full width -->
  <h5 class="text-secondary mb-3">Full Width (d-grid)</h5>
  <div class="d-grid col-md-6 mb-5">
    <button class="btn btn-danger btn-lg">Full Width Button</button>
  </div>

  <!-- States -->
  <h5 class="text-secondary mb-3">Button States</h5>
  <div class="d-flex flex-wrap gap-2 mb-5">
    <button class="btn btn-primary active">Active</button>
    <button class="btn btn-primary" disabled>Disabled (attr)</button>
    <button class="btn btn-primary disabled" aria-disabled="true">Disabled (class)</button>
    <a href="#" class="btn btn-success disabled" aria-disabled="true">Link Disabled</a>
  </div>

  <!-- Rounded pill buttons -->
  <h5 class="text-secondary mb-3">Rounded Pill Buttons</h5>
  <div class="d-flex flex-wrap gap-2 mb-5">
    <button class="btn btn-primary rounded-pill">Primary Pill</button>
    <button class="btn btn-success rounded-pill">Success Pill</button>
    <button class="btn btn-outline-danger rounded-pill">Outline Danger Pill</button>
  </div>

  <!-- Icon-like small buttons -->
  <h5 class="text-secondary mb-3">Small Action Buttons</h5>
  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-sm btn-outline-primary">Edit</button>
    <button class="btn btn-sm btn-outline-danger">Delete</button>
    <button class="btn btn-sm btn-outline-success">Approve</button>
    <button class="btn btn-sm btn-outline-warning">Archive</button>
    <button class="btn btn-sm btn-dark">View</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
